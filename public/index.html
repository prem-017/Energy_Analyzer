<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Energy Consumption Analyzer</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1>Energy Consumption Analyzer</h1>
    <p>Monitor your household electricity usage and discover simple ways to save energy.</p>
  </header>

  <main>
    <section class="cards" id="summaryCards"></section>

    <section class="panel">
      <h2>Log New Usage</h2>
      <form id="usageForm">
        <label>Date<input type="date" name="date" required /></label>
        <label>Hours used<input type="number" name="hours" step="0.1" min="0" required /></label>
        <label>Power (Watts)<input type="number" name="watts" min="0" required /></label>
        <label>Cost ($)<input type="number" name="cost" step="0.01" min="0" required /></label>
        <button type="submit">Add Entry</button>
      </form>
    </section>

    <section class="panel">
      <h2>Household Survey</h2>
      <form id="surveyForm">
        <label>Family size<input type="number" name="familySize" min="1" step="1" required /></label>
        <label>Total rooms<input type="number" name="totalRooms" min="1" step="1" required /></label>
        <label>Total LED bulbs<input type="number" name="ledBulbs" min="0" step="1" required /></label>
        <label>Grid availability hours/day<input type="number" name="gridHours" min="0" max="24" step="0.1" required /></label>
        <label>Refrigerators<input type="number" name="refrigerators" min="0" step="1" required /></label>
        <label>Water motors<input type="number" name="waterMotors" min="0" step="1" required /></label>
        <label>Fans<input type="number" name="fans" min="0" step="1" required /></label>
        <label>Power cut hours/month<input type="number" name="powerCutHours" min="0" step="1" required /></label>
        <label>Online usage hours/day<input type="number" name="onlineHours" min="0" max="24" step="0.1" required /></label>
        <label>Monthly income<input type="number" name="monthlyIncome" min="0" step="10" required /></label>
        <button type="submit">Get Suggestions</button>
      </form>
    </section>

    <section class="panel">
      <h2>Personalized Suggestions</h2>
      <ul id="surveySuggestions"></ul>
    </section>

    <section class="panel">
      <h2>Usage History</h2>
      <table>
        <thead>
          <tr>
            <th>Date</th>
            <th>Hours</th>
            <th>Watts</th>
            <th>kWh</th>
            <th>Cost</th>
          </tr>
        </thead>
        <tbody id="usageTable"></tbody>
      </table>
    </section>

    <section class="panel">
      <h2>Recommendations</h2>
      <ul id="recommendations"></ul>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
